name: Build APK & iOS (public)

# Ce workflow tourne sur le repo PUBLIC (minutes Actions gratuites).
# Il clone le code du repo PRIVÉ le temps du build (le code n'est jamais
# stocké ici), construit l'app, puis publie les binaires dans les Releases.
on:
  workflow_dispatch:
    inputs:
      build_mode:
        description: "Mode de build"
        type: choice
        options: [release, debug]
        default: release
      api_base_url:
        description: "URL de base de l'API (--dart-define API_BASE_URL)"
        type: string
        default: "https://staging.imdf.co/api/v1"
      api_origin:
        description: "Origine de l'API (--dart-define API_ORIGIN)"
        type: string
        default: "https://staging.imdf.co"
      publish_release:
        description: "Publier les binaires dans les Releases ?"
        type: boolean
        default: true
      release_tag:
        description: "Tag de la release (vide = auto : version pubspec + n° de run)"
        type: string
        default: ""

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write # nécessaire pour créer la Release sur CE repo

env:
  FLUTTER_CHANNEL: stable
  ORG: co.imdf
  PROJECT_NAME: imdf_mobile
  # Repo PRIVÉ d'où vient le code source (cloné le temps du build).
  SOURCE_REPO: nahim-salami/imdf-mobile

jobs:
  # ---------------------------------------------------------------------------
  # ANDROID — produit un .apk installable
  # ---------------------------------------------------------------------------
  android:
    name: Android APK (${{ inputs.build_mode }})
    runs-on: ubuntu-latest
    steps:
      # On récupère le code du repo PRIVÉ via un PAT en lecture seule.
      # Ce checkout est éphémère : il vit uniquement dans le runner.
      - name: Cloner le code privé
        uses: actions/checkout@v4
        with:
          repository: ${{ env.SOURCE_REPO }}
          token: ${{ secrets.SOURCE_REPO_TOKEN }}

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true

      - run: flutter --version

      # Le dépôt ne contient que lib/ + pubspec : on génère les dossiers natifs.
      # flutter create n'écrase PAS pubspec.yaml ni lib/ (fichiers déjà présents).
      - name: Générer les plateformes natives
        run: flutter create --org "$ORG" --project-name "$PROJECT_NAME" --platforms android .

      - name: Nom de l'app (label Android)
        run: sed -i 's/android:label="[^"]*"/android:label="IMDF"/' android/app/src/main/AndroidManifest.xml

      - name: Dépendances
        run: flutter pub get

      - name: Analyse statique (non bloquante)
        run: flutter analyze || true

      - name: Build APK
        run: >
          flutter build apk --${{ inputs.build_mode }}
          --dart-define=API_BASE_URL=${{ inputs.api_base_url }}
          --dart-define=API_ORIGIN=${{ inputs.api_origin }}
          --dart-define=ENABLE_NETWORK_LOGS=false

      - name: Renommer l'APK
        run: |
          mkdir -p artifacts
          cp build/app/outputs/flutter-apk/app-${{ inputs.build_mode }}.apk \
             artifacts/imdf-${{ inputs.build_mode }}.apk

      - uses: actions/upload-artifact@v4
        with:
          name: imdf-android-apk-${{ inputs.build_mode }}
          path: artifacts/imdf-${{ inputs.build_mode }}.apk
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # iOS — build NON signé (inspection / CI).
  # ---------------------------------------------------------------------------
  ios:
    name: iOS non signé (${{ inputs.build_mode }})
    runs-on: macos-latest
    steps:
      - name: Cloner le code privé
        uses: actions/checkout@v4
        with:
          repository: ${{ env.SOURCE_REPO }}
          token: ${{ secrets.SOURCE_REPO_TOKEN }}

      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true

      - run: flutter --version

      - name: Générer les plateformes natives
        run: flutter create --org "$ORG" --project-name "$PROJECT_NAME" --platforms ios .

      - name: Nom de l'app (iOS)
        run: |
          /usr/libexec/PlistBuddy -c "Set :CFBundleDisplayName IMDF" ios/Runner/Info.plist || /usr/libexec/PlistBuddy -c "Add :CFBundleDisplayName string IMDF" ios/Runner/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleName IMDF" ios/Runner/Info.plist || true

      - name: Dépendances
        run: flutter pub get

      - name: Build iOS (sans signature)
        run: >
          flutter build ios --${{ inputs.build_mode }} --no-codesign
          --dart-define=API_BASE_URL=${{ inputs.api_base_url }}
          --dart-define=API_ORIGIN=${{ inputs.api_origin }}
          --dart-define=ENABLE_NETWORK_LOGS=false

      - name: Empaqueter en IPA non signé
        run: |
          cd build/ios/iphoneos
          mkdir -p Payload
          cp -R Runner.app Payload/
          zip -qr imdf-ios-unsigned.ipa Payload

      - uses: actions/upload-artifact@v4
        with:
          name: imdf-ios-unsigned-${{ inputs.build_mode }}
          path: build/ios/iphoneos/imdf-ios-unsigned.ipa
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # RELEASE — publie les binaires dans les Releases de CE repo public.
  # ---------------------------------------------------------------------------
  release:
    name: Publier la release
    if: ${{ inputs.publish_release }}
    needs: [android, ios]
    runs-on: ubuntu-latest
    steps:
      # On lit juste pubspec.yaml du repo privé pour calculer la version.
      - name: Lire la version (code privé)
        uses: actions/checkout@v4
        with:
          repository: ${{ env.SOURCE_REPO }}
          token: ${{ secrets.SOURCE_REPO_TOKEN }}
          sparse-checkout: pubspec.yaml
          sparse-checkout-cone-mode: false

      - name: Récupérer les binaires construits
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Calculer le tag et le nom de la release
        id: meta
        run: |
          VERSION=$(grep -E '^version:' pubspec.yaml | sed -E 's/version:[[:space:]]*//; s/\+.*//' | tr -d '[:space:]')
          TAG="${{ inputs.release_tag }}"
          if [ -z "$TAG" ]; then
            TAG="v${VERSION}-build.${{ github.run_number }}"
          fi
          echo "tag=$TAG"   >> "$GITHUB_OUTPUT"
          echo "name=IMDF Mobile $TAG (${{ inputs.build_mode }})" >> "$GITHUB_OUTPUT"

      - name: Rassembler les fichiers à publier
        run: |
          mkdir -p release-files
          find dist -type f \( -name '*.apk' -o -name '*.ipa' \) -exec cp {} release-files/ \;
          ls -lh release-files

      - name: Publier la Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.meta.outputs.tag }}" \
            --repo "${{ github.repository }}" \
            --title "${{ steps.meta.outputs.name }}" \
            --notes "Build automatique — mode \`${{ inputs.build_mode }}\` — API \`${{ inputs.api_base_url }}\`. Le code source reste privé." \
            release-files/*

# -----------------------------------------------------------------------------
# NOTES
# -----------------------------------------------------------------------------
# • Ce workflow tourne sur le repo PUBLIC → minutes Actions gratuites (macOS inclus).
# • Le code source vient du repo PRIVÉ, cloné le temps du build via le secret
#   SOURCE_REPO_TOKEN (Fine-grained PAT, Contents: Read, limité au repo privé).
#   Le code n'est JAMAIS stocké dans ce repo public.
# • La Release est créée sur ce repo avec le GITHUB_TOKEN intégré (aucun PAT
#   supplémentaire nécessaire pour publier).
# • Déclenchement : onglet "Actions" → "Build APK & iOS (public)" → "Run workflow".
